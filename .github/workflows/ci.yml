name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build + smoke test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build sdist + wheel
        run: python -m build

      - name: Install the wheel
        run: python -m pip install dist/*.whl

      - name: Smoke test CLI
        run: |
          ccli-prompt --version
          ccli-prompt --help

      - name: Import all modules
        run: python -c "from ccli_prompt import cli, wizard, install, daemon; print('ok')"

      - name: Verify package data shipped in the wheel
        run: |
          python -c "
          from importlib.resources import files
          for name in ('ccli.zsh', 'prompt.md'):
              path = files('ccli_prompt') / 'data' / name
              assert path.is_file(), f'missing {name}'
              print(f'✓ {name}: {len(path.read_text())} bytes')
          "
